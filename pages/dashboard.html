<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Cuenta | CasaYa</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Inter:wght@200;300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/main.css">
    <style>
        .dashboard { padding-top: 80px; min-height: 100vh; background: #0a0a0f; }
        .dashboard-header { max-width: 1200px; margin: 0 auto; padding: 3rem 2rem 1rem; }
        .dashboard-header h1 { font-family: 'Cormorant Garamond', serif; font-size: 2rem; color: #fff; font-weight: 300; }
        .dashboard-tabs { display: flex; gap: 1rem; max-width: 1200px; margin: 0 auto; padding: 0 2rem; border-bottom: 1px solid rgba(255,255,255,0.08); }
        .dashboard-tab { padding: 1rem 1.5rem; color: rgba(255,255,255,0.5); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.3s; }
        .dashboard-tab.active { color: #c9a96e; border-bottom-color: #c9a96e; }
        .dashboard-content { max-width: 1200px; margin: 0 auto; padding: 2rem; }
        .tab-panel { display: none; }
        .tab-panel.active { display: block; }
        .favorites-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem; }
        .favorite-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; overflow: hidden; }
        .favorite-card img { width: 100%; height: 200px; object-fit: cover; }
        .favorite-card-content { padding: 1.5rem; }
        .favorite-card h3 { color: #fff; font-size: 1.1rem; margin-bottom: 0.5rem; }
        .favorite-card p { color: rgba(255,255,255,0.5); font-size: 0.875rem; margin-bottom: 1rem; }
        .favorite-card .price { color: #c9a96e; font-size: 1.25rem; font-weight: 500; }
        .favorite-actions { display: flex; gap: 0.5rem; margin-top: 1rem; }
        .favorite-actions a, .favorite-actions button { flex: 1; padding: 0.75rem; text-align: center; border-radius: 6px; text-decoration: none; font-size: 0.875rem; cursor: pointer; }
        .favorite-actions a { background: #c9a96e; color: #0a0a0f; }
        .favorite-actions button { background: rgba(255,71,87,0.1); color: #ff4757; border: 1px solid rgba(255,71,87,0.2); }
        .inquiries-list { display: flex; flex-direction: column; gap: 1rem; }
        .inquiry-item { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 1.5rem; }
        .inquiry-item h4 { color: #fff; margin-bottom: 0.5rem; }
        .inquiry-item p { color: rgba(255,255,255,0.6); font-size: 0.875rem; margin-bottom: 0.25rem; }
        .inquiry-status { display: inline-block; padding: 0.25rem 0.75rem; border-radius: 100px; font-size: 0.75rem; margin-top: 0.5rem; }
        .status-nuevo { background: rgba(0,212,170,0.1); color: #00d4aa; }
        .status-contactado { background: rgba(255,165,0,0.1); color: #ffa502; }
        .status-cerrado { background: rgba(255,71,87,0.1); color: #ff4757; }
        .empty-state { text-align: center; padding: 4rem; color: rgba(255,255,255,0.4); }
        .profile-form { max-width: 500px; }
        .profile-form input { width: 100%; padding: 1rem; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #fff; margin-bottom: 1rem; }
        .profile-form button { padding: 1rem 2rem; background: #c9a96e; color: #0a0a0f; border: none; border-radius: 8px; font-weight: 500; cursor: pointer; }
        .admin-link { display: inline-block; margin-top: 2rem; padding: 1rem 2rem; background: rgba(201,169,110,0.1); border: 1px solid #c9a96e; color: #c9a96e; border-radius: 8px; text-decoration: none; }
    </style>
</head>
<body>
    <nav class="nav">
        <a href="../index.html" class="nav-logo"><span class="logo-text">CasaYa</span><span class="logo-dot"></span></a>
        <div class="nav-links">
            <a href="../index.html#properties" class="nav-link">Propiedades</a>
            <a href="dashboard.html" class="nav-link active">Mi cuenta</a>
        </div>
    </nav>

    <div class="dashboard">
        <div class="dashboard-header">
            <h1>Mi cuenta</h1>
        </div>
        <div class="dashboard-tabs">
            <div class="dashboard-tab active" onclick="showTab('favorites')">❤️ Favoritos</div>
            <div class="dashboard-tab" onclick="showTab('inquiries')">📨 Solicitudes</div>
            <div class="dashboard-tab" onclick="showTab('profile')">👤 Perfil</div>
        </div>
        <div class="dashboard-content">
            <div class="tab-panel active" id="favorites">
                <div id="favoritesList"></div>
            </div>
            <div class="tab-panel" id="inquiries">
                <div id="inquiriesList"></div>
            </div>
            <div class="tab-panel" id="profile">
                <div class="profile-form">
                    <input type="text" id="profileName" placeholder="Tu nombre">
                    <input type="email" id="profileEmail" placeholder="Tu email">
                    <input type="tel" id="profilePhone" placeholder="Tu teléfono">
                    <button onclick="saveProfile()">Guardar perfil</button>
                </div>
                <a href="admin.html" class="admin-link" id="adminLink" style="display:none;">🔐 Panel de Administración</a>
            </div>
        </div>
    </div>

    <script src="../js/data.js"></script>
    <script>
        function showTab(tab) {
            document.querySelectorAll('.dashboard-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(tab).classList.add('active');
        }

        function renderFavorites() {
            const favs = Storage.getFavorites();
            const container = document.getElementById('favoritesList');
            if (favs.length === 0) {
                container.innerHTML = '<div class="empty-state"><h3>No tienes favoritos</h3><p>Guarda propiedades para verlas aquí</p></div>';
                return;
            }
            container.innerHTML = '<div class="favorites-grid">' + favs.map(id => {
                const p = getProperty(id);
                if (!p) return '';
                return `
                    <div class="favorite-card">
                        <img src="${p.image}" alt="${p.title}">
                        <div class="favorite-card-content">
                            <h3>${p.title}</h3>
                            <p>${p.location}</p>
                            <div class="price">${formatPrice(p.price)}</div>
                            <div class="favorite-actions">
                                <a href="propiedad.html?id=${p.id}">Ver</a>
                                <button onclick="removeFav(${p.id})">Eliminar</button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('') + '</div>';
        }

        function renderInquiries() {
            const inquiries = Storage.getInquiries();
            const container = document.getElementById('inquiriesList');
            if (inquiries.length === 0) {
                container.innerHTML = '<div class="empty-state"><h3>No has enviado solicitudes</h3><p>Contacta con agentes desde las propiedades</p></div>';
                return;
            }
            container.innerHTML = '<div class="inquiries-list">' + inquiries.map(i => `
                <div class="inquiry-item">
                    <h4>${i.propertyTitle}</h4>
                    <p>📅 ${new Date(i.date).toLocaleDateString('es-ES')}</p>
                    <p>👤 ${i.name} · ${i.email}</p>
                    <p>💬 ${i.message.substring(0, 100)}...</p>
                    <span class="inquiry-status status-${i.status}">${i.status}</span>
                </div>
            `).join('') + '</div>';
        }

        function removeFav(id) {
            Storage.removeFavorite(id);
            renderFavorites();
        }

        function saveProfile() {
            const user = {
                name: document.getElementById('profileName').value,
                email: document.getElementById('profileEmail').value,
                phone: document.getElementById('profilePhone').value,
                isAdmin: document.getElementById('profileEmail').value.includes('admin')
            };
            Storage.setUser(user);
            alert('Perfil guardado');
            checkAdmin();
        }

        function checkAdmin() {
            const user = Storage.getUser();
            if (user && user.isAdmin) {
                document.getElementById('adminLink').style.display = 'inline-block';
            }
        }

        function loadProfile() {
            const user = Storage.getUser();
            if (user) {
                document.getElementById('profileName').value = user.name || '';
                document.getElementById('profileEmail').value = user.email || '';
                document.getElementById('profilePhone').value = user.phone || '';
            }
            checkAdmin();
        }

        renderFavorites();
        renderInquiries();
        loadProfile();
    </script>
</body>
</html>
