<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Propiedad | CasaYa</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Inter:wght@200;300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/main.css">
    <style>
        .property-detail { padding-top: 80px; min-height: 100vh; background: #0a0a0f; }
        .property-gallery { position: relative; height: 60vh; overflow: hidden; }
        .property-gallery img { width: 100%; height: 100%; object-fit: cover; }
        .gallery-nav { position: absolute; bottom: 2rem; left: 50%; transform: translateX(-50%); display: flex; gap: 0.5rem; }
        .gallery-dot { width: 10px; height: 10px; border-radius: 50%; background: rgba(255,255,255,0.3); cursor: pointer; }
        .gallery-dot.active { background: #c9a96e; }
        .property-info { max-width: 1200px; margin: 0 auto; padding: 3rem 2rem; display: grid; grid-template-columns: 2fr 1fr; gap: 3rem; }
        .property-main h1 { font-family: 'Cormorant Garamond', serif; font-size: 2.5rem; font-weight: 300; color: #fff; margin-bottom: 0.5rem; }
        .property-location { color: rgba(255,255,255,0.6); font-size: 1rem; margin-bottom: 1.5rem; }
        .property-price-tag { font-size: 2rem; color: #c9a96e; font-weight: 500; margin-bottom: 2rem; }
        .property-description { color: rgba(255,255,255,0.7); line-height: 1.8; margin-bottom: 2rem; }
        .property-features { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.75rem; margin-bottom: 2rem; }
        .feature-item { display: flex; align-items: center; gap: 0.5rem; color: rgba(255,255,255,0.7); font-size: 0.9rem; }
        .feature-item::before { content: "✓"; color: #c9a96e; }
        .property-sidebar { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 2rem; }
        .agent-card { text-align: center; margin-bottom: 2rem; }
        .agent-card img { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; margin-bottom: 1rem; }
        .agent-card h4 { color: #fff; margin-bottom: 0.25rem; }
        .agent-card p { color: rgba(255,255,255,0.5); font-size: 0.875rem; }
        .contact-form input, .contact-form textarea { width: 100%; padding: 0.875rem 1rem; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #fff; margin-bottom: 1rem; font-family: 'Inter', sans-serif; }
        .contact-form textarea { min-height: 120px; resize: vertical; }
        .contact-form button { width: 100%; padding: 1rem; background: #c9a96e; color: #0a0a0f; border: none; border-radius: 8px; font-weight: 500; cursor: pointer; }
        .property-actions { display: flex; gap: 1rem; margin-top: 2rem; }
        .btn-fav { padding: 0.875rem 1.5rem; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #fff; cursor: pointer; display: flex; align-items: center; gap: 0.5rem; }
        .btn-fav.active { background: rgba(201,169,110,0.1); border-color: #c9a96e; color: #c9a96e; }
        .property-stats { display: flex; gap: 2rem; margin-bottom: 2rem; }
        .stat { text-align: center; }
        .stat-value { font-size: 1.5rem; color: #fff; font-weight: 500; }
        .stat-label { font-size: 0.75rem; color: rgba(255,255,255,0.5); text-transform: uppercase; }
        @media (max-width: 768px) { .property-info { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <nav class="nav">
        <a href="../index.html" class="nav-logo"><span class="logo-text">CasaYa</span><span class="logo-dot"></span></a>
        <div class="nav-links">
            <a href="../index.html#properties" class="nav-link">Propiedades</a>
            <a href="../index.html#neighborhoods" class="nav-link">Barrios</a>
            <a href="dashboard.html" class="nav-link">Mi cuenta</a>
        </div>
    </nav>

    <div class="property-detail" id="propertyDetail">
        <!-- Se rellena con JS -->
    </div>

    <script src="../js/data.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const propertyId = urlParams.get('id');
        const property = getProperty(propertyId);

        if (!property) {
            document.getElementById('propertyDetail').innerHTML = '<div style="padding: 5rem; text-align: center; color: #fff;"><h1>Propiedad no encontrada</h1></div>';
        } else {
            const isFav = Storage.isFavorite(property.id);
            document.getElementById('propertyDetail').innerHTML = `
                <div class="property-gallery">
                    <img src="${property.image}" alt="${property.title}" id="mainImage">
                    <div class="gallery-nav">
                        ${property.gallery.map((img, i) => `<div class="gallery-dot ${i === 0 ? 'active' : ''}" onclick="changeImage('${img}', this)"></div>`).join('')}
                    </div>
                </div>
                <div class="property-info">
                    <div class="property-main">
                        <h1>${property.title}</h1>
                        <p class="property-location">📍 ${property.location}</p>
                        <p class="property-price-tag">${formatPrice(property.price)}</p>
                        <div class="property-stats">
                            <div class="stat"><div class="stat-value">${property.beds}</div><div class="stat-label">Habitaciones</div></div>
                            <div class="stat"><div class="stat-value">${property.baths}</div><div class="stat-label">Baños</div></div>
                            <div class="stat"><div class="stat-value">${property.sqm}</div><div class="stat-label">m²</div></div>
                        </div>
                        <p class="property-description">${property.description}</p>
                        <h3 style="color: #fff; margin-bottom: 1rem; font-weight: 400;">Características</h3>
                        <div class="property-features">
                            ${property.features.map(f => `<div class="feature-item">${f}</div>`).join('')}
                        </div>
                        <div class="property-actions">
                            <button class="btn-fav ${isFav ? 'active' : ''}" onclick="toggleFav(${property.id})">
                                ${isFav ? '❤️ Guardada' : '🤍 Guardar'}
                            </button>
                            <a href="tel:${property.agent.phone}" class="btn-fav">📞 Llamar</a>
                        </div>
                    </div>
                    <div class="property-sidebar">
                        <div class="agent-card">
                            <img src="${property.agent.image}" alt="${property.agent.name}">
                            <h4>${property.agent.name}</h4>
                            <p>Agente inmobiliario</p>
                        </div>
                        <form class="contact-form" onsubmit="sendInquiry(event, ${property.id})">
                            <input type="text" placeholder="Tu nombre" required id="inquiryName">
                            <input type="email" placeholder="Tu email" required id="inquiryEmail">
                            <input type="tel" placeholder="Tu teléfono" id="inquiryPhone">
                            <textarea placeholder="Mensaje" required id="inquiryMessage">Hola, me interesa la propiedad "${property.title}"</textarea>
                            <button type="submit">Solicitar información</button>
                        </form>
                    </div>
                </div>
            `;
        }

        function changeImage(src, dot) {
            document.getElementById('mainImage').src = src;
            document.querySelectorAll('.gallery-dot').forEach(d => d.classList.remove('active'));
            dot.classList.add('active');
        }

        function toggleFav(id) {
            if (Storage.isFavorite(id)) {
                Storage.removeFavorite(id);
            } else {
                Storage.addFavorite(id);
            }
            location.reload();
        }

        function sendInquiry(e, propertyId) {
            e.preventDefault();
            const inquiry = {
                propertyId,
                propertyTitle: property.title,
                name: document.getElementById('inquiryName').value,
                email: document.getElementById('inquiryEmail').value,
                phone: document.getElementById('inquiryPhone').value,
                message: document.getElementById('inquiryMessage').value
            };
            Storage.addInquiry(inquiry);
            alert('¡Solicitud enviada! El agente contactará contigo pronto.');
            e.target.reset();
        }
    </script>
</body>
</html>
